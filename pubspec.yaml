name: rolter
description: "A declarative, tree-based router for Flutter focused on typed routes and nested navigation"
version: 0.1.0

homepage: https://github.com/ntfnd404/rolter
repository: https://github.com/ntfnd404/rolter
issue_tracker: https://github.com/ntfnd404/rolter/issues

topics:
  - deep-linking
  - navigation
  - navigator
  - nested-navigation
  - router

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

screenshots:
  - description: Architecture of typed routes, codecs, guards, state, and nested navigators.
    path: screenshots/architecture.webp
  - description: Opening a nested deep link and navigating back through nested and root stacks.
    path: screenshots/deep_link_nested_back.gif

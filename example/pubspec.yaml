name: example
description: "Example app for the rolter router: nested tabs, route guards, push-for-result, dialog-as-route, custom transitions, master-detail, and per-route scopes."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  rolter:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

name: example
description: "Example app for the rolter router: nested tabs, route guards, push-for-result, dialog-as-route, custom transitions, master-detail, and per-route scopes."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.0.0

  rolter:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

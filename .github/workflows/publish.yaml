name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match ^v[0-9]+\\.[0-9]+\\.[0-9]+$; got $tag." >&2
            exit 1
          fi

          version="${tag#v}"
          pubspec_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          changelog_version="$(sed -nE 's/^##[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$/\1/p' CHANGELOG.md | head -n 1)"
          version_pattern="${version//./\\.}"

          test "$pubspec_version" = "$version"
          test "$changelog_version" = "$version"
          grep -Eq "^[[:space:]]*rolter:[[:space:]]*\\^${version_pattern}[[:space:]]*$" README.md
          git cat-file -e "refs/tags/$tag^{tag}"

          git fetch --no-tags origin main
          tag_commit="$(git rev-parse "refs/tags/$tag^{}")"
          main_commit="$(git rev-parse origin/main)"
          test "$tag_commit" = "$main_commit"

  publish:
    name: Publish to pub.dev
    needs: validate-release
    permissions:
      contents: read
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
    with:
      environment: pub-dev

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-quality:
    name: Latest / quality and archive
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos --fatal-warnings
      - run: flutter test
      - run: flutter test --coverage
      - run: dart run tool/check_coverage.dart
      - run: dart doc --dry-run
      - run: flutter pub outdated
      - run: dart pub publish --dry-run
      - name: Analyze example
        working-directory: example
        run: |
          flutter pub get
          flutter analyze --fatal-infos --fatal-warnings

  minimum-sdk:
    name: Flutter 3.32 / declared minimum
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.32.0
          channel: stable
          cache: true
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: flutter pub get
      - run: dart analyze --fatal-infos --fatal-warnings
      - run: flutter test
      - name: Analyze example
        working-directory: example
        run: |
          flutter pub get
          flutter analyze --fatal-infos --fatal-warnings
      - name: Build external consumer on Web and Android
        shell: bash
        run: |
          consumer="$(mktemp -d)/consumer"
          flutter create --empty --platforms=android,web "$consumer"
          cd "$consumer"
          flutter pub add rolter --path "$GITHUB_WORKSPACE"
          cp "$GITHUB_WORKSPACE/tool/consumer_smoke_main.dart" lib/main.dart
          flutter analyze --fatal-infos --fatal-warnings
          flutter build web
          flutter build apk --debug

  dependency-lower-bounds:
    name: Dependency lower bounds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Downgrade and test an isolated copy
        shell: bash
        run: |
          copy="$(mktemp -d)/rolter"
          mkdir -p "$copy"
          rsync -a --exclude=.git --exclude=.dart_tool --exclude=build \
            --exclude=coverage ./ "$copy/"
          cd "$copy"
          flutter pub downgrade
          dart analyze --fatal-infos --fatal-warnings
          flutter test
          cd example
          flutter pub downgrade
          flutter analyze --fatal-infos --fatal-warnings
          cd "$GITHUB_WORKSPACE"
          git diff --exit-code

  package-quality:
    name: Pana and package contents
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Install screenshot validation tools
        run: sudo apt-get update && sudo apt-get install -y webp
      - name: Validate screenshot limits
        shell: bash
        run: |
          test "$(find screenshots -type f | wc -l)" -le 10
          test -z "$(find screenshots -type f -size +4096k -print -quit)"
      - name: Run pana in an isolated copy
        shell: bash
        run: |
          copy="$(mktemp -d)/rolter"
          mkdir -p "$copy"
          rsync -a --exclude=.git --exclude=.dart_tool --exclude=build \
            --exclude=coverage ./ "$copy/"
          dart pub global activate pana 0.23.14
          pana --exit-code-threshold 0 "$copy"
          cd "$copy"
          dart pub publish --dry-run
      - name: Verify HTTPS metadata links
        shell: bash
        run: |
          curl --fail --silent --show-error --location --head \
            https://github.com/ntfnd404/rolter >/dev/null
          curl --fail --silent --show-error --location --head \
            https://github.com/ntfnd404/rolter/issues >/dev/null
